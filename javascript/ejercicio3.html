<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre">
    <input type="button" value="Enviar" onclick="saludar()">
    <br>
    <input type="button" value="Calcular Promedio" onclick="promedio()">
    <br>
    <br>
    <input type="button" value="Ver si es positivo o negativo" onclick="Numerar()">
    <br>
    <br>
    <input type="button" value="Ver si el año es bisiesto" onclick="bisiesto()">

    <script>
        function saludar() {
            let nombre = document.getElementById('nombre').value;
            alert("Hola " + nombre);
        }

        function promedio() {
            let num1 = Number(prompt("Ingrese el primer numero"));
            let num2 = Number(prompt("Ingrese el segundo numero"));
            let promedio = (num1 + num2) / 2;
            alert("El promedio es: " + promedio);
        }

        function Numerar() {
            let num = Number(prompt("Ingrese un numero"));
            if (num < 0) {
                alert("El número introducido es negativo")
            } else if (num > 0) {
                alert("El número introducido es positivo")
            } else {
                alert("El número es cero")
            }
        }

        function bisiesto() {
            let año = Number(prompt("Ingrese un año para ver si es bisiesto."));
            if (año % 4 === 0 && año % 100 !== 0 || año % 400 === 0) {
                alert("El año es bisiesto")
            } else {
                alert("El año no es bisiesto mi loco")
            }
        }
    </script>
</body>
</html>
