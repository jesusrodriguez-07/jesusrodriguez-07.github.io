<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tabla de Usuarios</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                text-align: center;
                margin-top: 50px;
            }
            table {
                margin: 0 auto;
                border-collapse: collapse; /* Mantiene los bordes limpios y unidos */
                width: 80%;
                box-shadow: 0px 0px 10px rgba(0,0,0,0.1); /* Un toque de sombra para que quede pro */
            }
            th, td {
                border: 1px solid #333; /* Borde oscuro para que se vea bien la cuadrícula */
                padding: 10px;
            }
            th {
                background-color: #007BFF; /* Cabecera azul */
                color: white; /* Texto blanco en la cabecera */
            }
            /* Truco visual: filas alternas de distinto color (cebra) */
            tr:nth-child(even) {
                background-color: #f2f2f2;
            }
        </style>
    </head>
    <body>
        <h2>Lista de Usuarios (JSON a Tabla)</h2>
        
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Apellidos</th>
                    <th>Edad</th>
                    <th>Ciudad</th>
                </tr>
            </thead>
            <tbody id="moderno">
            </tbody>
        </table>
        
        <div id="Muestreo" style="margin-top: 20px; font-weight: bold; color: green;"></div>

        <script>
            document.addEventListener("DOMContentLoaded", function() {
                
                // 1. Creamos el Array de objetos
                let obj = [
                    {nombre: "Alberto", apellidos: "Pingi", edad: "19", ciudad: "Sevilla"},
                    {nombre: "María", apellidos: "García", edad: "25", ciudad: "Madrid"},
                    {nombre: "Juan", apellidos: "López", edad: "30", ciudad: "Barcelona"},
                    {nombre: "Ana", apellidos: "Martínez", edad: "22", ciudad: "Valencia"},
                    {nombre: "Luis", apellidos: "Sánchez", edad: "28", ciudad: "Bilbao"},
                    {nombre: "Angel", apellidos: "Carapapa", edad:"14", ciudad: "ActivaCam"}
                ];
                
                let tablaModerno = document.getElementById("moderno");
                
                // 2. Lo mostramos en el HTML
                for (let i = 0; i < obj.length; i++) {
                    // Ahora creamos 4 <td> separados, uno para cada dato del objeto
                    let fila = `<tr>
                                    <td>${obj[i].nombre}</td>
                                    <td>${obj[i].apellidos}</td>
                                    <td>${obj[i].edad}</td>
                                    <td>${obj[i].ciudad}</td>
                                </tr>`;
                    
                    tablaModerno.innerHTML += fila;
                }

                // 3. Lo convertimos a texto (Serializar)
                let objserializado = serializar(obj);
                console.log("Objeto convertido a texto (JSON): " + objserializado);

                // 4. Lo volvemos a convertir a objeto (Deserializar)
                let deVueltaAObjeto = recibir(objserializado);
                
                // 5. Mostramos el nombre recuperado en el div inferior
                document.getElementById("Muestreo").innerHTML = "Dato recuperado tras deserializar: " + deVueltaAObjeto[0].nombre;
            });

            // --- TUS FUNCIONES ---
            function serializar(obj) {
                return JSON.stringify(obj);
            }

            function deserializar(objJson) { 
                return JSON.parse(objJson);
            }

            function recibir(json_serializado) {
                console.log("Recibiendo texto JSON...");
                return deserializar(json_serializado);
            }
        </script>
    </body>
</html>
