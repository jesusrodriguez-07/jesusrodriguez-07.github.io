<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2: MEGARETO</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        /* --- CSS BONITO Y LIMPIO --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .contenedor {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }
        h1 { color: #2c3e50; text-align: center; }
        
        /* Estilos del formulario */
        form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }
        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            flex: 1;
            min-width: 120px;
        }
        button {
            padding: 10px 15px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background-color: #2980b9; }
        .btn-borrar { background-color: #e74c3c; padding: 5px 10px; }
        .btn-borrar:hover { background-color: #c0392b; }

        /* Estilos de la tabla */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        th { background-color: #2c3e50; color: white; }
        tr:hover { background-color: #f1f1f1; }

        /* Estilos de las estadísticas */
        .estadisticas {
            display: flex;
            justify-content: space-around;
            background-color: #ecf0f1;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
        }
        .estadisticas span { color: #e67e22; }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Ejemplo 2: Datos dinámicos</h1>
        
        <form id="miFormulario">
            <input type="text" id="nombre" placeholder="Nombre">
            <input type="text" id="apellidos" placeholder="Apellidos">
            <input type="number" id="edad" placeholder="Edad">
            <input type="text" id="ciudad" placeholder="Ciudad">
            <button type="submit">Añadir usuario</button>
        </form>

        <table id="miTabla">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Apellidos</th>
                    <th>Edad</th>
                    <th>Ciudad</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>

        <div class="estadisticas">
            <div>Suma = <span id="stat-suma">0</span></div>
            <div>Máximo = <span id="stat-max">0</span></div>
            <div>Media = <span id="stat-media">0</span></div>
            <div>Mínimo = <span id="stat-min">0</span></div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // 1 y 2. Crea un array en JS inicialmente vacío
            let usuarios = [];

            // EXTRA (Punto 5 opcional): Recuperar datos serializados de localStorage si existen
            let datosGuardados = localStorage.getItem('miJSON_Usuarios');
            if(datosGuardados) {
                usuarios = JSON.parse(datosGuardados); // Deserializar
                generaTabla(usuarios);
            }

            // Capturar evento submit del formulario
            $('#miFormulario').on('submit', function(e) {
                e.preventDefault(); // EVITA QUE SE RECARGUE LA PÁGINA

                // Recoger valores
                let nombre = $('#nombre').val().trim();
                let apellidos = $('#apellidos').val().trim();
                let edad = $('#edad').val().trim();
                let ciudad = $('#ciudad').val().trim();

                // RETO: Comprobar que todos los campos estén rellenos
                if(!nombre) { alert("El campo Nombre es obligatorio"); return; }
                if(!apellidos) { alert("El campo Apellidos es obligatorio"); return; }
                if(!edad) { alert("El campo Edad es obligatorio"); return; }
                if(!ciudad) { alert("El campo Ciudad es obligatorio"); return; }

                edad = parseInt(edad); // Aseguramos que la edad es un número

                // 3. Añadir (push) los datos del formulario al objeto
                usuarios.push({ nombre: nombre, apellidos: apellidos, edad: edad, ciudad: ciudad });

                // Limpiamos los inputs del formulario
                this.reset();
                $('#nombre').focus();

                // 4. Serializa la lista a JSON (Usamos localStorage para guardarlo en el navegador)
                let jsonString = JSON.stringify(usuarios);
                localStorage.setItem('miJSON_Usuarios', jsonString);
                console.log("Datos serializados (JSON):", jsonString); // Mostramos en consola

                // 5. Pasa esta variable a la función generaTabla
                generaTabla(usuarios);
            });

            // 5. Función generaTabla
            function generaTabla(lista) {
                let tbody = $('#miTabla tbody');
                tbody.empty(); // Limpiar tabla antes de redibujar

                // Por cada elemento del objeto recuperado (forEach)...
                lista.forEach(function(user, index) {
                    // ...se generará un TR con la función generaTR
                    let nuevaFila = generaTR(user, index);
                    tbody.append(nuevaFila);
                });

                // Calculamos las estadísticas
                calculaEstadisticas(lista);
            }

            // Función para generar cada fila
            function generaTR(user, index) {
                let tr = $('<tr>').append(
                    $('<td>').text(user.nombre),
                    $('<td>').text(user.apellidos),
                    $('<td>').text(user.edad),
                    $('<td>').text(user.ciudad),
                    $('<td>').append('<button class="btn-borrar">Eliminar</button>')
                );

                // 6 y 7. Añade el reto anterior (al eliminar, desaparecer la fila del ARRAY usando splice y el índice)
                tr.find('.btn-borrar').on('click', function() {
                    usuarios.splice(index, 1); // Borramos 1 elemento desde la posición 'index'
                    
                    // Actualizamos el JSON guardado
                    localStorage.setItem('miJSON_Usuarios', JSON.stringify(usuarios));
                    
                    // Volvemos a dibujar la tabla para actualizar los índices y la vista
                    generaTabla(usuarios);
                });

                return tr;
            }

            // RETO: Cálculos estadísticos
            function calculaEstadisticas(lista) {
                if (lista.length === 0) {
                    $('#stat-suma, #stat-media, #stat-max, #stat-min').text('0');
                    return;
                }

                // Usamos métodos de arrays modernos (map y reduce)
                let suma = lista.reduce((acumulador, u) => acumulador + u.edad, 0);
                let media = suma / lista.length;
                let maximo = Math.max(...lista.map(u => u.edad));
                let minimo = Math.min(...lista.map(u => u.edad));

                // Mostramos en los SPAN del HTML
                $('#stat-suma').text(suma);
                $('#stat-media').text(media.toFixed(2)); // Solo 2 decimales
                $('#stat-max').text(maximo);
                $('#stat-min').text(minimo);

                // También lo mostramos en consola como pedía el ejercicio
                console.log(`ESTADÍSTICAS -> Suma: ${suma} | Media: ${media.toFixed(2)} | Máximo: ${maximo} | Mínimo: ${minimo}`);
            }
        });
    </script>
</body>
</html>
